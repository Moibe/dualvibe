name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 165.22.53.200 >> ~/.ssh/known_hosts

      - name: Build project
        run: npm run build

      - name: Pull latest code on server
        run: |
          ssh root@165.22.53.200 "cd /root/code/dualvibe && git reset --hard && git pull origin main"

      - name: Deploy to server
        run: |
          rsync -av --delete dist/ root@165.22.53.200:/root/code/dualvibe/dist/

      - name: Verify deployment
        run: |
          ssh root@165.22.53.200 "ls -la /root/code/dualvibe/dist/ | head -10"

      - name: Deployment summary
        if: success()
        run: echo "🚀 Deploy a 165.22.53.200 completado exitosamente"

      - name: Notify deployment failure
        if: failure()
        run: echo "❌ El deploy falló. Revisa los logs arriba."
